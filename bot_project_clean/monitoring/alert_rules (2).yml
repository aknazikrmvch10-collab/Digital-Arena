groups:
  - name: digital_arena_alerts
    rules:
      # 🚨 High CPU Usage
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
        for: 2m
        labels:
          severity: warning
          service: digital-arena
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 2 minutes on {{ $labels.instance }}"

      # 🚨 High Memory Usage
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 512
        for: 2m
        labels:
          severity: warning
          service: digital-arena
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 512MB for more than 2 minutes on {{ $labels.instance }}"

      # 🚨 Database Connection Issues
      - alert: DatabaseConnectionFailure
        expr: database_connections_active == 0
        for: 1m
        labels:
          severity: critical
          service: digital-arena
        annotations:
          summary: "Database connection failure"
          description: "No active database connections detected for more than 1 minute"

      # 🚨 Redis Connection Issues
      - alert: RedisConnectionFailure
        expr: redis_connections_active == 0
        for: 1m
        labels:
          severity: critical
          service: digital-arena
        annotations:
          summary: "Redis connection failure"
          description: "No active Redis connections detected for more than 1 minute"

      # 🚨 High Error Rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          service: digital-arena
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for more than 2 minutes"

      # 🚨 Slow Response Time
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 2m
        labels:
          severity: warning
          service: digital-arena
        annotations:
          summary: "Slow response time detected"
          description: "95th percentile response time is above 2 seconds for more than 2 minutes"

      # 🚨 Bot Not Responding
      - alert: BotNotResponding
        expr: up{job="digital-arena-app"} == 0
        for: 1m
        labels:
          severity: critical
          service: digital-arena
        annotations:
          summary: "Digital Arena bot is not responding"
          description: "The bot has been down for more than 1 minute"

      # 🚨 Low Booking Rate
      - alert: LowBookingRate
        expr: rate(bookings_created_total[1h]) < 0.1
        for: 30m
        labels:
          severity: warning
          service: digital-arena
        annotations:
          summary: "Low booking rate detected"
          description: "Booking rate is below 0.1 per hour for more than 30 minutes"

      # 🚨 Disk Space Low
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
          service: digital-arena
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10% on {{ $labels.instance }}"

      # 🚨 External API Failure
      - alert: ExternalAPIFailure
        expr: rate(external_api_requests_failed_total[5m]) / rate(external_api_requests_total[5m]) > 0.5
        for: 2m
        labels:
          severity: warning
          service: digital-arena
        annotations:
          summary: "External API failure rate high"
          description: "External API failure rate is above 50% for more than 2 minutes"
