<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArenaSlot – Бронирование</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>
    <div class="container">
        <!-- Club Info Header -->
        <div class="header">
            <h2 id="club-name">Загрузка...</h2>
            <p id="club-address">
                <span class="change-club-link" onclick="goBackToClubs()">(Сменить)</span>
            </p>
            <button class="my-bookings-btn" onclick="openMyBookings()">
                📅 Мои Брони
            </button>
        </div>

        <!-- Zones Selector -->
        <div class="zones-container" id="zones">
            <!-- Zones injected by JS -->
        </div>

        <!-- Computer Grid -->
        <div class="computer-grid" id="computer-grid">
            <!-- Computers injected by JS -->
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Бронирование</h3>
                <button class="close-btn" onclick="closeBookingModal()">✕</button>
            </div>

            <div class="booking-details">
                <div class="selected-pc-name" id="modal-pc-name">PC-00</div>

                <!-- Date Tabs -->
                <div class="date-tabs">
                    <button class="date-tab active" onclick="selectDate(0, this)">Сегодня</button>
                    <button class="date-tab" onclick="selectDate(1, this)">Завтра</button>
                </div>

                <!-- Time Grid -->
                <div class="section-title">Время начала</div>
                <div class="time-grid" id="time-grid">
                    <!-- Time slots injected by JS -->
                </div>

                <!-- Duration -->
                <div class="section-title">Длительность</div>
                <div class="duration-selector">
                    <button class="duration-btn" onclick="adjustDuration(-30)">-</button>
                    <span id="duration-display">1 ч 00 мин</span>
                    <button class="duration-btn" onclick="adjustDuration(30)">+</button>
                </div>

                <!-- Total Price -->
                <div class="total-price-section">
                    <span>Итого:</span>
                    <span class="total-price" id="total-price">0 сум</span>
                </div>

                <button class="confirm-btn" id="confirm-booking-btn" onclick="confirmBooking()">
                    ЗАБРОНИРОВАТЬ
                </button>
            </div>
        </div>
    </div>

    <!-- My Bookings Modal -->
    <div id="my-bookings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📅 Мои Брони</h3>
                <button class="close-btn" onclick="closeMyBookings()">✕</button>
            </div>
            <div id="my-bookings-list" class="bookings-list">
                <!-- Bookings injected by JS -->
                <div class="empty-state-small">
                    Загрузка...
                </div>
            </div>
        </div>
    </div>

    <!-- Selected Computer Info Panel -->
    <div id="selected-info" class="selected-info" style="display: none;">
        <!-- Image Header -->
        <div class="computer-image-container">
            <button class="close-btn-floating" onclick="unselectComputer()">✕</button>
            <img src="" id="selected-image" class="computer-image" alt="Computer Setup"
                onerror="this.src='https://images.unsplash.com/photo-1593640408182-31c70c8268f5?auto=format&fit=crop&w=800&q=80'">
            <div class="image-overlay"></div>
        </div>

        <div class="info-content-wrapper">
            <div class="info-header">
                <div class="info-title">
                    <h3 id="selected-name">Select PC</h3>
                    <div class="computer-status" style="font-size: 12px; color: var(--success);">● Свободен</div>
                </div>
                <div class="price-tag" id="selected-price">
                    0 UZS/ч
                </div>
            </div>

            <div class="specs">
                <!-- Specs injected by JS -->
            </div>
        </div>
    </div>

    <script src="app.js?v=9"></script>
</body>

</html>
