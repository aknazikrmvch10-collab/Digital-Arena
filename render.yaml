services:
  - type: web
    name: arena-booking-bot
    runtime: python
    region: frankfurt
    plan: free
    pythonVersion: "3.11.11"
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DB_URL
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: BASE_URL
        value: https://digital-arena-njok.onrender.com
      - key: REDIS_HOST
        value: localhost
